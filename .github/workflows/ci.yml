name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: library_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci --prefer-offline

      - name: Lint
        run: cd backend && npm run lint

      - name: Push schema
        env:
          DATABASE_URL: mysql://root:test123@127.0.0.1:3306/library_test
          JWT_SECRET: ci-test-secret-key-at-least-32-chars
        run: cd backend && npx prisma db push --skip-generate && npx prisma generate

      - name: Run tests
        env:
          DATABASE_URL: mysql://root:test123@127.0.0.1:3306/library_test
          TEST_DATABASE_URL: mysql://root:test123@127.0.0.1:3306/library_test
          JWT_SECRET: ci-test-secret-key-at-least-32-chars
        run: cd backend && npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline

      - name: Build
        run: cd frontend && npm run build
